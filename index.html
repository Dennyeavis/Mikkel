<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Den Nye Avis</title>
<meta name="description" content="Køb og sælg brugte ting i Danmark. Gratis annoncer på Den Nye Avis.">
<style>
body {font-family: Arial; margin:0}
header {background:#003399; color:#fff; padding:15px; display:flex; justify-content:space-between; align-items:center}
button {background:#ffcc00; border:none; padding:8px 12px; cursor:pointer; margin-left:5px}
.hero {padding:30px; text-align:center; background:#f5f5f5}
.grid {display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:10px; padding:10px}
.card {border:1px solid #ccc; padding:10px}
.modal {display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#0008}
.box {background:#fff; padding:20px; margin:10% auto; width:320px; max-height:70%; overflow:auto}
.user {font-size:12px}
.carousel {display:flex; overflow:hidden; gap:10px; padding:10px}
.carousel-track {display:flex; gap:10px; animation: scroll 20s linear infinite}
@keyframes scroll {0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.carousel img {width:150px; border-radius:8px}
.cta-popup {position:fixed; bottom:20px; right:20px; background:#003399; color:#fff; padding:15px; border-radius:10px; cursor:pointer}
.footer {padding:20px; text-align:center; background:#eee}
</style>
</head>
<body>

<header>
<h2>Den Nye Avis</h2>
<div>
<span class="user" id="user"></span>
<button onclick="login()">Login</button>
<button onclick="logout()">Logout</button>
<button onclick="toggleMyAds()">Mine annoncer</button>
<button onclick="openModal()">Ny annonce</button>
<button onclick="openContact()">Kontakt</button>
</div>
</header>

<div class="hero">
<h1>Køb og sælg i hele Danmark</h1>
<p>Gratis annoncer – hurtigt og nemt</p>
<button onclick="openModal()">Opret annonce nu</button>
</div>

<div class="carousel"><div class="carousel-track" id="carousel"></div></div>
<div class="grid" id="listings"></div>

<div class="cta-popup" onclick="openModal()">📢 Har du noget at sælge?</div>

<!-- KONTAKT -->
<div class="modal" id="contactModal">
<div class="box">
<h3>Kontakt kundeservice</h3>
<input id="contactName" placeholder="Navn"><br>
<input id="contactEmail" placeholder="Email"><br>
<textarea id="contactMsg" placeholder="Besked"></textarea><br><br>
<button onclick="sendContact()">Send</button>
<button onclick="closeContact()">Luk</button>
</div>
</div>

<!-- NY ANNONCE -->
<div class="modal" id="modal">
<div class="box">
<h3>Ny annonce</h3>
<input id="title" placeholder="Titel"><br>
<input id="price" placeholder="Pris"><br>
<input id="city" placeholder="By"><br>
<textarea id="desc" placeholder="Beskrivelse"></textarea><br>
<input type="file" id="image"><br><br>
<button onclick="save()">Gem</button>
<button onclick="closeModal()">Luk</button>
</div>
</div>

<!-- CHAT -->
<div class="modal" id="chatModal">
<div class="box">
<h3>Chat</h3>
<div id="chatMessages"></div>
<input id="chatInput" placeholder="Skriv besked"><br><br>
<button onclick="sendMessage()">Send</button>
<button onclick="closeChat()">Luk</button>
</div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDX7j-Kyo60eOrzQGoCJZL_n7-CE1n5BBk",
  authDomain: "dennyeavis-f2b4a.firebaseapp.com",
  projectId: "dennyeavis-f2b4a"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

let currentUser = null;
let showOnlyMine = false;
let currentChatId = null;

function login(){
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider).catch(()=>auth.signInWithRedirect(provider));
}

function logout(){ auth.signOut(); }

auth.onAuthStateChanged(user=>{
  currentUser = user;
  document.getElementById("user").innerText = user ? user.email : "Ikke logget ind";
});

function share(title){
  const url = window.location.href;
  const text = encodeURIComponent(title + " - Se annoncen her: " + url);
  window.open("https://www.facebook.com/sharer/sharer.php?u=" + encodeURIComponent(url) + "&quote=" + text);
}

function render(){
  const container=document.getElementById("listings");
  const carousel=document.getElementById("carousel");

  db.collection("listings").orderBy("created","desc").onSnapshot(snapshot=>{
    container.innerHTML="";
    carousel.innerHTML="";

    snapshot.forEach(doc=>{
      const d=doc.data();
      if(showOnlyMine && currentUser && d.user !== currentUser.uid) return;

      const div=document.createElement("div");
      div.className="card";

      div.innerHTML=`
        <img src="${d.image || 'https://via.placeholder.com/300'}" style="width:100%">
        <h4>${d.title}</h4>
        <p>${d.price} kr</p>
        <small>${d.city}</small>
        <br><button onclick="openChat('${doc.id}')">Chat</button>
        <button onclick="share('${d.title}')">Del</button>
        ${currentUser && d.user === currentUser.uid ? `<br><button onclick="deleteAd('${doc.id}')">Slet</button>` : ""}
      `;

      container.appendChild(div);

      const img=document.createElement("img");
      img.src=d.image || 'https://via.placeholder.com/300';
      carousel.appendChild(img.cloneNode());
      carousel.appendChild(img);
    });
  });
}

function toggleMyAds(){ showOnlyMine = !showOnlyMine; render(); }
function deleteAd(id){ if(confirm("Slet?")) db.collection("listings").doc(id).delete(); }

function openModal(){ if(!currentUser) return alert("Log ind"); document.getElementById("modal").style.display="block"; }
function closeModal(){ document.getElementById("modal").style.display="none"; }

function openContact(){ document.getElementById("contactModal").style.display="block"; }
function closeContact(){ document.getElementById("contactModal").style.display="none"; }

function sendContact(){
  const name=document.getElementById("contactName").value;
  const email=document.getElementById("contactEmail").value;
  const msg=document.getElementById("contactMsg").value;

  db.collection("support").add({name,email,msg,created:Date.now()});
  alert("Tak! Vi vender tilbage.");
  closeContact();
}

function save(){
  if(!currentUser) return alert("Log ind først");

  const title=document.getElementById("title").value;
  const price=document.getElementById("price").value;
  const city=document.getElementById("city").value;
  const desc=document.getElementById("desc").value;
  const file=document.getElementById("image").files[0];

  if(!title || !price) return alert("Udfyld titel og pris");

  const addData = (img)=>{
    db.collection("listings").add({title,price,city,desc,image:img,user:currentUser.uid,created:Date.now()});
    closeModal();
  };

  if(!file) return addData("https://via.placeholder.com/300");

  const img = new Image();
  const reader = new FileReader();
  reader.onload=e=>img.src=e.target.result;
  img.onload=()=>{
    const canvas=document.createElement("canvas");
    const scale=800/img.width;
    canvas.width=800;
    canvas.height=img.height*scale;
    canvas.getContext("2d").drawImage(img,0,0,canvas.width,canvas.height);
    addData(canvas.toDataURL("image/jpeg",0.7));
  };
  reader.readAsDataURL(file);
}

function openChat(id){
  if(!currentUser) return alert("Log ind for chat");
  currentChatId = id;
  document.getElementById("chatModal").style.display="block";

  db.collection("chats").doc(id).collection("messages").orderBy("created")
  .onSnapshot(snap=>{
    const box=document.getElementById("chatMessages");
    box.innerHTML="";
    snap.forEach(doc=>{
      const m=doc.data();
      const div=document.createElement("div");
      div.innerText = m.user + ": " + m.text;
      box.appendChild(div);
    });
  });
}

function closeChat(){ document.getElementById("chatModal").style.display="none"; }

function sendMessage(){
  const text=document.getElementById("chatInput").value;
  if(!text) return;

  db.collection("chats").doc(currentChatId).collection("messages").add({
    text,
    user: currentUser.email,
    created: Date.now()
  });

  document.getElementById("chatInput").value="";
}

render();
</script>

</body>
</html>
