<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Den Nye Avis</title>
<style>
body {font-family: Arial; margin:0}
header {background:#003399; color:#fff; padding:15px; display:flex; justify-content:space-between; align-items:center}
button {background:#ffcc00; border:none; padding:8px 12px; cursor:pointer; margin-left:5px}
.grid {display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:10px; padding:10px}
.card {border:1px solid #ccc; padding:10px}
.modal {display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#0008}
.box {background:#fff; padding:20px; margin:10% auto; width:300px}
.user {font-size:12px}
</style>
</head>
<body>

<header>
<h2>Den Nye Avis</h2>
<div>
<span class="user" id="user"></span>
<button onclick="login()">Login</button>
<button onclick="logout()">Logout</button>
<button onclick="toggleMyAds()">Mine annoncer</button>
<button onclick="openModal()">Ny annonce</button>
</div>
</header>

<div class="grid" id="listings"></div>

<div class="modal" id="modal">
<div class="box">
<h3>Ny annonce</h3>
<input id="title" placeholder="Titel"><br>
<input id="price" placeholder="Pris"><br>
<input id="city" placeholder="By"><br>
<textarea id="desc" placeholder="Beskrivelse"></textarea><br>
<input type="file" id="image"><br><br>
<button onclick="save()">Gem</button>
<button onclick="closeModal()">Luk</button>
</div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDX7j-Kyo60eOrzQGoCJZL_n7-CE1n5BBk",
  authDomain: "dennyeavis-f2b4a.firebaseapp.com",
  projectId: "dennyeavis-f2b4a"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

let currentUser = null;
let showOnlyMine = false;

function login(){
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider)
    .then(()=>{
      console.log("Login succes");
    })
    .catch(err=>{
      console.error("Login fejl:", err);
      alert("Login virker ikke endnu – husk at aktivere Google login i Firebase");
    });
}

function logout(){
  auth.signOut();
}

auth.onAuthStateChanged(user=>{
  currentUser = user;
  document.getElementById("user").innerText = user ? user.email : "Ikke logget ind";
});

function render(){
  const container=document.getElementById("listings");

  db.collection("listings").orderBy("created","desc").onSnapshot(snapshot=>{
    container.innerHTML="";

    snapshot.forEach(doc=>{
      const d=doc.data();

      // filtrer hvis "mine annoncer" er aktiv
      if(showOnlyMine && currentUser && d.user !== currentUser.uid) return;

      const div=document.createElement("div");
      div.className="card";

      div.innerHTML=`
        <img src="${d.image || 'https://via.placeholder.com/300'}" style="width:100%">
        <h4>${d.title}</h4>
        <p>${d.price} kr</p>
        <small>${d.city}</small>
        ${currentUser && d.user === currentUser.uid ? `<br><button onclick="deleteAd('${doc.id}')">Slet</button>` : ""}
      `;

      container.appendChild(div);
    });
  });
}

function toggleMyAds(){
  showOnlyMine = !showOnlyMine;
  render();
}

function deleteAd(id){
  if(confirm("Er du sikker på du vil slette?")){
    db.collection("listings").doc(id).delete();
  }
}

function openModal(){
  if(!currentUser){
    alert("Du skal være logget ind");
    return;
  }
  document.getElementById("modal").style.display="block";
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}

function save(){
  if(!currentUser) return alert("Log ind først");

  const title=document.getElementById("title").value;
  const price=document.getElementById("price").value;
  const city=document.getElementById("city").value;
  const desc=document.getElementById("desc").value;
  const file=document.getElementById("image").files[0];

  if(!title || !price) return alert("Udfyld titel og pris");

  if(!file){
    db.collection("listings").add({
      title, price, city, desc,
      image:"https://via.placeholder.com/300",
      user: currentUser.uid,
      created: Date.now()
    });
    closeModal();
    return;
  }

  const reader = new FileReader();
  reader.onload = function(e){
    db.collection("listings").add({
      title, price, city, desc,
      image: e.target.result,
      user: currentUser.uid,
      created: Date.now()
    });
    closeModal();
  };

  reader.readAsDataURL(file);
}

render();
</script>

</body>
</html>
